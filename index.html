<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz — Seguridad e Integridad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    /* ── RESET ── */
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── TOKENS ── */
    :root {
      --bg:          #06090f;
      --surface:     #0c1420;
      --surface-hi:  #111d2e;
      --border:      #1c2d42;
      --border-hi:   #2c4460;
      --text:        #d0e0f0;
      --text-mid:    #7a9ab8;
      --text-dim:    #3a5878;
      --accent:      #00c8f8;
      --accent-glow: rgba(0,200,248,0.12);
      --green:       #00e87c;
      --green-bg:    rgba(0,232,124,0.06);
      --red:         #ff3355;
      --red-bg:      rgba(255,51,85,0.06);
      /* category */
      --c-cia:        #00c8f8;
      --c-riesgo:     #a78bfa;
      --c-cripto-sim: #00e87c;
      --c-cripto-asi: #34d399;
      --c-auth:       #fbbf24;
      --c-auditoria:  #fb7185;
      --c-acceso:     #6ee7b7;
      --c-fundamentos:#c084fc;
    }

    /* ── BASE ── */
    html { font-size: 16px; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRID BACKGROUND ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,200,248,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,248,0.022) 1px, transparent 1px);
      background-size: 52px 52px;
      pointer-events: none; z-index: 0;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem max(1rem, env(safe-area-inset-left)) 0.5rem max(1rem, env(safe-area-inset-right));
      border-bottom: 1px solid var(--border);
      background: rgba(6,9,15,0.96);
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(10px);
    }
    .sys-id {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem; color: var(--text-dim);
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .sys-id em { color: var(--accent); font-style: normal; }
    .status-indicator {
      display: flex; align-items: center; gap: 0.4rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem; color: var(--green);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .status-dot {
      width: 6px; height: 6px;
      background: var(--green); border-radius: 50%;
      animation: blink 2.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* ── MAIN WRAPPER ── */
    .wrap {
      position: relative; z-index: 1;
      max-width: 720px; margin: 0 auto;
      padding: 0 max(1rem, env(safe-area-inset-left))
               max(5rem, calc(env(safe-area-inset-bottom) + 5rem))
               max(1rem, env(safe-area-inset-right));
    }

    /* ── HEADER ── */
    header {
      padding: 2.5rem 0 2rem;
      animation: rise 0.6s ease-out both;
    }
    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem; color: var(--accent);
      letter-spacing: 0.15em; text-transform: uppercase;
      margin-bottom: 0.65rem;
    }
    .eyebrow::before { content: '// '; opacity: 0.45; }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 9vw, 3.5rem);
      color: var(--text); letter-spacing: 0.04em; line-height: 0.95;
      margin-bottom: 0.8rem;
    }
    header h1 span { color: var(--accent); }

    header p {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.58rem, 2.4vw, 0.68rem);
      color: var(--text-dim); letter-spacing: 0.06em; line-height: 1.9;
    }

    /* ── PROGRESS ── */
    #progress-bar-wrap {
      margin-bottom: 1.75rem;
      animation: rise 0.6s 0.1s ease-out both;
    }
    #progress-label {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 0.55rem;
    }
    #prog-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem; color: var(--text-mid); letter-spacing: 0.08em;
    }
    #score-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem; color: var(--green); letter-spacing: 0.05em;
    }
    #progress-bar {
      height: 2px; background: var(--surface-hi);
      position: relative; overflow: visible;
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      transition: width 0.55s cubic-bezier(0.4,0,0.2,1);
      width: 0%; position: relative;
    }
    #progress-fill::after {
      content: '';
      position: absolute; right: 0; top: 50%;
      transform: translate(50%,-50%);
      width: 7px; height: 7px;
      background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 10px var(--accent);
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px; overflow: hidden;
      margin-bottom: 1rem;
      animation: rise 0.32s ease-out both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-stripe {
      height: 2px;
      transition: background 0.3s;
    }

    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.7rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.25);
    }

    .badge {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      display: flex; align-items: center; gap: 0.45rem;
    }
    .badge::before { content: '●'; font-size: 0.42rem; }

    .badge.cia         { color: var(--c-cia); }
    .badge.riesgo      { color: var(--c-riesgo); }
    .badge.cripto-sim  { color: var(--c-cripto-sim); }
    .badge.cripto-asi  { color: var(--c-cripto-asi); }
    .badge.auth        { color: var(--c-auth); }
    .badge.auditoria   { color: var(--c-auditoria); }
    .badge.acceso      { color: var(--c-acceso); }
    .badge.fundamentos { color: var(--c-fundamentos); }

    .q-counter {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem; color: var(--text-dim); letter-spacing: 0.1em;
    }

    .card-body {
      padding: 1.25rem 1.25rem 0.5rem;
    }

    .card h2 {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(0.95rem, 3.8vw, 1.08rem);
      font-weight: 500; line-height: 1.65;
      color: var(--text); word-break: break-word;
    }

    pre {
      background: rgba(0,0,0,0.45);
      border: 1px solid var(--border); border-radius: 2px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      padding: 0.75rem 1rem;
      font-size: clamp(0.62rem,2.5vw,0.74rem);
      line-height: 1.7; color: var(--accent);
      margin-bottom: 0; white-space: pre;
      word-break: normal; max-width: 100%;
    }
    code { font-family: 'Space Mono', ui-monospace, monospace; }
    h2 code, .feedback code, .text code {
      background: rgba(0,200,248,0.07);
      border: 1px solid rgba(0,200,248,0.18);
      border-radius: 2px; padding: 0.1em 0.35em;
      font-size: 0.85em; color: var(--accent);
      word-break: break-all;
      font-family: 'Space Mono', monospace;
    }

    /* ── OPTIONS ── */
    .options {
      display: flex; flex-direction: column; gap: 0.42rem;
      padding: 1rem 1.25rem 0.75rem;
    }

    .option {
      display: flex; align-items: flex-start; gap: 0.8rem;
      background: transparent;
      border: 1px solid var(--border); border-radius: 2px;
      padding: clamp(0.65rem,2.5vw,0.8rem) clamp(0.75rem,2.5vw,0.9rem);
      cursor: pointer;
      transition: border-color 0.14s, background 0.14s;
      user-select: none; min-width: 0; position: relative; overflow: hidden;
    }
    .option::after {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 2px; background: var(--accent);
      transform: scaleY(0); transform-origin: center;
      transition: transform 0.14s ease;
    }
    @media (hover: hover) {
      .option:hover:not(.disabled) {
        border-color: var(--border-hi);
        background: var(--surface-hi);
      }
      .option:hover:not(.disabled)::after { transform: scaleY(1); }
      .option:hover:not(.disabled) .letter {
        border-color: var(--accent);
        color: var(--accent);
      }
      .option:hover:not(.disabled) .text { color: var(--text); }
    }
    .option:active:not(.disabled) {
      background: var(--surface-hi);
    }

    .option .letter {
      flex-shrink: 0; width: 24px; height: 24px;
      border: 1px solid var(--border-hi);
      background: rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem; font-weight: 700; color: var(--text-dim);
      transition: all 0.14s; min-width: 24px;
      border-radius: 0; margin-top: 1px;
    }

    .option .text {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(0.82rem,3.2vw,0.9rem);
      font-weight: 400; line-height: 1.55;
      color: var(--text-mid); min-width: 0; flex: 1;
      word-break: break-word; transition: color 0.14s;
    }
    .option .text pre {
      margin-top: 0.4rem;
      font-size: clamp(0.6rem,2.3vw,0.72rem);
      white-space: pre-wrap; word-break: break-all; overflow-x: visible;
    }

    /* ── OPTION STATES ── */
    .option.correct {
      border-color: var(--green); background: var(--green-bg);
    }
    .option.correct::after { background: var(--green); transform: scaleY(1); }
    .option.correct .letter {
      background: var(--green); border-color: var(--green); color: var(--bg);
    }
    .option.correct .text { color: rgba(0,232,124,0.9); }

    .option.wrong {
      border-color: var(--red); background: var(--red-bg);
    }
    .option.wrong::after { background: var(--red); transform: scaleY(1); }
    .option.wrong .letter {
      background: var(--red); border-color: var(--red); color: #fff;
    }
    .option.wrong .text { color: rgba(255,80,110,0.9); }

    .option.dimmed { opacity: 0.22; }
    .option.disabled { cursor: default; }

    /* ── FEEDBACK ── */
    .feedback {
      display: none; margin: 0 1.25rem 0.5rem;
      padding: 0.85rem 1rem;
      border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(0.8rem,3vw,0.87rem); line-height: 1.65;
      word-break: break-word;
    }
    .feedback.show { display: block; }
    .feedback.ok {
      background: var(--green-bg);
      border: 1px solid rgba(0,232,124,0.2);
      border-left: 2px solid var(--green);
      color: rgba(180,255,220,0.85);
    }
    .feedback.fail {
      background: var(--red-bg);
      border: 1px solid rgba(255,51,85,0.2);
      border-left: 2px solid var(--red);
      color: rgba(255,160,175,0.9);
    }
    .feedback strong {
      display: block; margin-bottom: 0.4rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase;
    }
    .feedback.ok strong   { color: var(--green); }
    .feedback.fail strong { color: var(--red); }

    /* ── BUTTONS ── */
    .btn-row {
      display: flex; gap: 0.5rem;
      padding: 0.75rem 1.25rem 1.25rem;
    }

    .btn-prev {
      flex: 0 0 auto;
      padding: 0.72rem 1rem;
      background: transparent; color: var(--text-dim);
      border: 1px solid var(--border); border-radius: 2px;
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.62rem,2.5vw,0.7rem);
      font-weight: 700; letter-spacing: 0.06em;
      cursor: pointer; display: none;
      min-height: 44px; touch-action: manipulation;
      transition: color 0.14s, border-color 0.14s;
    }
    .btn-prev:hover { color: var(--text-mid); border-color: var(--border-hi); }
    .btn-prev.show  { display: block; }

    .btn-next {
      flex: 1;
      padding: 0.72rem;
      background: var(--accent); color: var(--bg);
      border: none; border-radius: 2px;
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.62rem,2.5vw,0.7rem);
      font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; display: none;
      min-height: 44px; touch-action: manipulation;
      transition: opacity 0.14s, box-shadow 0.14s;
    }
    .btn-next:hover  { opacity: 0.88; box-shadow: 0 0 18px rgba(0,200,248,0.3); }
    .btn-next:active { opacity: 0.72; }
    .btn-next.show   { display: block; }

    /* ── SCORE SCREEN ── */
    #score-screen {
      display: none;
      animation: rise 0.4s ease-out both;
    }
    .score-card {
      background: var(--surface);
      border: 1px solid var(--border); border-radius: 2px; overflow: hidden;
    }
    .score-stripe {
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--green));
    }
    .score-inner {
      padding: clamp(2rem,5vw,3rem) clamp(1.25rem,4vw,2rem);
      text-align: center;
    }
    .score-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem; color: var(--text-dim);
      letter-spacing: 0.15em; text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .score-eyebrow::before { content: '// '; opacity: 0.45; }

    #score-screen h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.6rem,6vw,2.2rem);
      color: var(--text); letter-spacing: 0.05em; margin-bottom: 0.3rem;
    }
    .big {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem,16vw,6.5rem);
      line-height: 1; color: var(--accent);
      letter-spacing: 0.04em; margin: 0.2rem 0 0.7rem;
      text-shadow: 0 0 50px rgba(0,200,248,0.25);
    }
    #final-msg {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(0.85rem,3vw,0.95rem);
      color: var(--text-mid); line-height: 1.65;
      margin: 0 auto 2rem; max-width: 420px;
    }

    .breakdown {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(128px,1fr));
      gap: 0.45rem; margin-bottom: 2rem; text-align: left;
    }
    .breakdown-item {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border); border-radius: 2px;
      padding: 0.65rem 0.85rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.74rem; color: var(--text-dim);
    }
    .breakdown-item span {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 1.05rem; font-weight: 700;
      color: var(--text); margin-bottom: 0.2rem;
    }

    .btn-restart {
      padding: 0.85rem 2.5rem;
      background: transparent; color: var(--accent);
      border: 1px solid var(--accent); border-radius: 2px;
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.68rem,2.5vw,0.76rem);
      font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; min-height: 48px; touch-action: manipulation;
      transition: background 0.14s, box-shadow 0.14s;
    }
    .btn-restart:hover {
      background: var(--accent-glow);
      box-shadow: 0 0 20px rgba(0,200,248,0.15);
    }
  </style>
</head>
<body>

<div class="status-bar">
  <span class="sys-id">SIS/<em>SEG·INFO</em> · v2.5</span>
  <span class="status-indicator">
    <span class="status-dot"></span>
    Sistema activo
  </span>
</div>

<div class="wrap">

  <header>
    <div class="eyebrow">Módulo de evaluación</div>
    <h1>Seguridad<br>e <span>Integridad</span></h1>
    <p>CIA TRIAD · GESTIÓN DE RIESGO · CRIPTOGRAFÍA · AUTENTICACIÓN · AUDITORÍA</p>
  </header>

  <div id="progress-bar-wrap">
    <div id="progress-label">
      <span id="prog-text">Pregunta 1</span>
      <span id="score-text">0 correctas</span>
    </div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>

  <div id="quiz-container"></div>

  <div id="score-screen">
    <div class="score-card">
      <div class="score-stripe"></div>
      <div class="score-inner">
        <div class="score-eyebrow">Evaluación completada</div>
        <h2>Resultado Final</h2>
        <div class="big" id="final-score"></div>
        <p id="final-msg"></p>
        <div class="breakdown" id="breakdown"></div>
        <button class="btn-restart" onclick="restart()">Reintentar evaluación</button>
      </div>
    </div>
  </div>

</div><!-- .wrap -->

<script src="preguntas_seguridad.js"></script>
<script>
// ──────────────────────────────────────────────
// ESTADO Y LÓGICA
// ──────────────────────────────────────────────
const state = new Array(questions.length).fill(null);
let current = 0;
let score   = 0;

const CAT_COLORS = {
  "cia":         "#00c8f8",
  "riesgo":      "#a78bfa",
  "cripto-sim":  "#00e87c",
  "cripto-asi":  "#34d399",
  "auth":        "#fbbf24",
  "auditoria":   "#fb7185",
  "acceso":      "#6ee7b7",
  "fundamentos": "#c084fc",
};

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render(){
  const q = questions[current];
  const s = state[current];
  const letters = ['A','B','C','D','E'];
  const catColor = CAT_COLORS[q.cat] || '#00c8f8';

  const optionsHTML = q.options.map((opt,i)=>{
    const content = opt.code
      ? `<span class="text"><pre><code>${escHtml(opt.code)}</code></pre></span>`
      : `<span class="text">${opt.text}</span>`;
    let cls = 'option';
    if(s !== null){
      cls += ' disabled';
      if(i === q.correct)          cls += ' correct';
      else if(i === s.answeredIdx) cls += ' wrong';
      else                          cls += ' dimmed';
    }
    const click = s === null ? `onclick="answer(${i})"` : '';
    return `<div class="${cls}" ${click}><span class="letter">${letters[i]}</span>${content}</div>`;
  }).join('');

  let feedbackHTML = '';
  if(s !== null){
    const cls  = s.wasCorrect ? 'feedback show ok' : 'feedback show fail';
    const icon = s.wasCorrect ? '✓ Correcto' : '✗ Incorrecto';
    feedbackHTML = `<div class="${cls}"><strong>${icon}</strong>${q.explanation}</div>`;
  }

  const showNext = s !== null;
  const showPrev = current > 0;
  const isLast   = current === questions.length - 1;
  const qNum     = String(current + 1).padStart(2, '0');

  document.getElementById('quiz-container').innerHTML = `
    <div class="card">
      <div class="card-stripe" style="background:${catColor}"></div>
      <div class="card-header">
        <span class="badge ${q.cat}">${CAT_LABELS[q.cat]}</span>
        <span class="q-counter">Q·${qNum} / ${questions.length}</span>
      </div>
      <div class="card-body">
        <h2>${q.q}</h2>
      </div>
      <div class="options">${optionsHTML}</div>
      ${feedbackHTML}
      <div class="btn-row">
        <button class="btn-prev ${showPrev?'show':''}" onclick="prev()">← Ant</button>
        <button class="btn-next ${showNext?'show':''}" onclick="next()">
          ${isLast ? 'Ver resultado' : 'Siguiente →'}
        </button>
      </div>
    </div>`;

  updateProgress();
  if(s !== null) window.scrollTo({top:0, behavior:'smooth'});
}

function answer(idx){
  if(state[current] !== null) return;
  const wasCorrect = idx === questions[current].correct;
  if(wasCorrect) score++;
  state[current] = { answeredIdx:idx, wasCorrect };
  render();
}

function next(){
  if(current < questions.length - 1){ current++; render(); }
  else showScore();
}

function prev(){
  if(current > 0){ current--; render(); }
}

function updateProgress(){
  const total    = questions.length;
  const answered = state.filter(s=>s!==null).length;
  document.getElementById('progress-fill').style.width = (answered/total*100)+'%';
  document.getElementById('prog-text').textContent  = `Pregunta ${current+1} de ${total}`;
  document.getElementById('score-text').textContent = `${score} correctas`;
}

function showScore(){
  document.getElementById('quiz-container').style.display    = 'none';
  document.getElementById('progress-bar-wrap').style.display = 'none';
  const screen = document.getElementById('score-screen');
  screen.style.display = 'block';
  document.getElementById('final-score').textContent = `${score} / ${questions.length}`;

  const cats = {};
  questions.forEach((q,i)=>{
    if(!cats[q.cat]) cats[q.cat] = {correct:0, total:0};
    cats[q.cat].total++;
    if(state[i]?.wasCorrect) cats[q.cat].correct++;
  });
  document.getElementById('breakdown').innerHTML = Object.entries(cats).map(([cat,v])=>
    `<div class="breakdown-item"><span>${v.correct}/${v.total}</span>${CAT_LABELS[cat]}</div>`
  ).join('');

  const pct = score / questions.length;
  let msg = '';
  if     (pct===1)   msg = 'Perfecto. Dominás todos los temas del parcial.';
  else if(pct>=0.85) msg = 'Muy bien. Repasá los que fallaste.';
  else if(pct>=0.65) msg = 'Bien encaminado. Prestá atención a criptografía y controles de auditoría.';
  else               msg = 'Seguí practicando — revisá CIA, gestión de riesgo y los factores de autenticación.';
  document.getElementById('final-msg').textContent = msg;
  window.scrollTo({top:0, behavior:'smooth'});
}

function restart(){
  current = 0; score = 0; state.fill(null);
  document.getElementById('quiz-container').style.display    = 'block';
  document.getElementById('progress-bar-wrap').style.display = 'block';
  document.getElementById('score-screen').style.display      = 'none';
  render();
}

render();
</script>
</body>
</html>
